[build]
  publish = "dist"
  command = "npm run build"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
    timeout = 26

    [[edge_functions]]
      function = "claude"
        path = "/api/claude"
# Route to edge function for 50s timeout
[[redirects]]
  from = "/.netlify/functions/claude"
    to = "/api/claude"
      status = 200
        force = true
        

# SPA fallback - all routes go to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
